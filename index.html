<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Service Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="background-circles">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <div class="chat-container">
        <header class="chat-header">
            <div class="bot-info">
                <div class="bot-avatar">
                   <img src="https://ui-avatars.com/api/?name=C+S&background=0D8ABC&color=fff" alt="Avatar">
                </div>
                <div class="bot-details">
                    <h1>AssistBot</h1>
                    <span class="status">Online</span>
                </div>
            </div>
            <div class="header-actions">
                <button id="clear-chat" title="Clear Chat"><i class="fas fa-trash"></i></button>
            </div>
        </header>

        <main class="chat-messages" id="chat-messages">
            <div class="message bot-message fade-in">
                <div class="message-content">
                    Hello! I'm AssistBot. How can I help you today?
                </div>
                <span class="timestamp">12:10 PM</span>
            </div>
        </main>

        <footer class="chat-footer">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
                <button id="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
